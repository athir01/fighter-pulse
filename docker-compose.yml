services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: fighterpulse
      POSTGRES_PASSWORD: fighterpulse
      POSTGRES_DB: fighterpulse
    ports:
      - "5432:5432"
    volumes:
      - fighterpulse_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fighterpulse"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  fighterpulse_pgdata:
